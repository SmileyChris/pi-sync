[project]

site_name = "pi-sync"
site_description = "P2P sync for pi coding agent settings using Automerge CRDTs over WebSocket."
site_author = "pi-sync contributors"

copyright = """
Copyright &copy; 2026 The pi-sync authors
"""

nav = [
    { "Home" = "index.md" },
    { "Get Started" = [
        { "Install" = "get-started/install.md" },
        { "Pair machines" = "get-started/pair-machines.md" },
    ] },
    { "User Guide" = [
        { "Commands" = "user-guide/commands.md" },
        { "Configuration" = "user-guide/config.md" },
        { "Local-only files" = "user-guide/local-only.md" },
        { "Trash" = "user-guide/trash.md" },
    ] },
    { "Concepts" = [
        { "Architecture" = "concepts/architecture.md" },
        { "Data flow" = "concepts/data-flow.md" },
        { "Tombstones" = "concepts/tombstones.md" },
        { "CRDT model" = "concepts/crdt-model.md" },
    ] },
    { "Developer" = [
        { "Project layout" = "developer/project-layout.md" },
        { "Key rules" = "developer/key-rules.md" },
        { "Testing" = "developer/testing.md" },
        { "Pitfalls" = "developer/pitfalls.md" },
    ] },
    { "Reference" = [
        { "Commands" = "reference/commands.md" },
        { "Config schema" = "reference/config-schema.md" },
    ] },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
